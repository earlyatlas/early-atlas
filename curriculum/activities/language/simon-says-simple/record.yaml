id: ea.activity.language.simon-says-simple
slug: simon-says-simple
title: Simple Simon Says
summary: Children follow one-step spoken directions in a playful listening game.
supported_skill_ids:
  - ea.skill.language.receptive.follows-one-step-directions
age_range_months:
  min: 12
  max: 30
group_size: 1-6 children
duration_minutes: 10
materials:
  - No materials needed
setup: Stand where children can see and hear you clearly.
steps:
  - Give one simple direction at a time, such as "Touch your nose."
  - Pause and let the child carry out the direction without gesturing.
  - Celebrate the action and name it back ("You touched your nose!").
  - Add new one-step directions as the child succeeds.
variations:
  - Use directions tied to a routine, like "Put the cup on the tray."
  - Let the child be the leader and give a direction.
differentiation:
  - For beginners, pair the words with a gesture, then fade the gesture.
  - For older children, try two-step directions.
assessment_opportunities:
  - Note whether the child follows directions without a gesture cue.
accessibility_notes:
  - Pair spoken directions with a sign or picture for children who are deaf or hard of hearing.
  - Allow extra processing time before repeating.
research_reference_ids:
  - ea.citation.cdc.learn-the-signs
tags:
  - listening
  - directions
  - movement
methodologies:
  - play-based
status: accepted
locale: en-US
