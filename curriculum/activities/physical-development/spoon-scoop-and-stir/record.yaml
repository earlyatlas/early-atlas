id: ea.activity.physical-development.spoon-scoop-and-stir
slug: spoon-scoop-and-stir
title: Spoon, Scoop, and Stir Tool Tray
summary: >-
  A toddler adjusts their grasp to use real tools, a spoon, a scoop, and a small
  rolling pin, while transferring and pressing simple materials.
supported_skill_ids:
  - ea.skill.physical-development.fine-motor.adjusts-grasp-to-use-tools
age_range_months:
  min: 12
  max: 36
group_size: 1-3 children
duration_minutes: 15
materials:
  - A child-size spoon and a small scoop
  - Two bowls, one with dry oats or large dry pasta
  - A lump of soft play dough and a small rolling pin
  - A tray to contain the materials
setup: >-
  Set out the tray with the two bowls and tools for scooping, and a separate space
  with play dough and the rolling pin. Demonstrate calmly before inviting the
  child.
steps:
  - Show the child how to hold the spoon and scoop oats from one bowl to the other.
  - Let them transfer back and forth, adjusting their grip as they go.
  - Switch to the play dough and model rolling it flat with the rolling pin.
  - Invite the child to press, roll, and poke the dough with the tool.
  - Talk about how each tool is held differently to make it work.
variations:
  - Use water and a small ladle outdoors for a pouring version.
  - Add tongs to pick up larger pasta pieces for an extra grip challenge.
differentiation:
  - For younger toddlers, use a large scoop and a wide bowl to ensure success.
  - For older children, switch to a smaller spoon and ask them to fill a marked line.
assessment_opportunities:
  - Note whether the child changes their grasp to match each tool and task.
  - Watch for growing control in scooping, transferring, and rolling.
safety_notes:
  - Use child-safe tools and supervise to prevent mouthing of dry materials or
    small tools.
  - Follow each child's allergy plan when choosing food materials.
accessibility_notes:
  - Offer built-up or weighted handles for children building grip strength.
  - Stabilize bowls with a non-slip mat and allow extra time.
research_reference_ids:
  - ea.citation.cdc.learn-the-signs
tags:
  - fine-motor
  - tool-use
  - grasp
  - transferring
  - toddler
methodologies:
  - montessori
  - play-based
status: accepted
locale: en-US
