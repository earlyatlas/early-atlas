id: ea.standard.elof.p-atl-2
framework: elof
framework_title: Head Start Early Learning Outcomes Framework
code: "P-ATL 2"
title: "Child follows classroom rules and routines with increasing independence."
domain_area: "Approaches to Learning"
sub_domain: "Emotional and Behavioral Self-Regulation"
age_band: preschooler
indicators:
  - age_period: "36 to 48 Months"
    text: "Follows simple rules and routines with assistance from adults, such as hanging up their coat or sitting at the table when asked by an adult."
  - age_period: "48 to 60 Months"
    text: "Usually follows classroom rules and routines with occasional reminders from adults, such as following an end-of-lunch routine that includes putting away their plate, washing hands, and lining up at the door to go outside."
  - age_period: "By 60 Months"
    text: "Demonstrates awareness of classroom rules when asked and is able to follow these rules most of the time."
  - age_period: "By 60 Months"
    text: "Follows most classroom routines, such as putting away backpack when entering the room or sitting on the rug after outside time."
  - age_period: "By 60 Months"
    text: "Responds to signals when transitioning from one activity to another."
source_url: https://headstart.gov/school-readiness/article/approaches-learning-preschool
attribution: "Head Start Early Learning Outcomes Framework (ELOF), Office of Head Start — U.S. federal government work, public domain."
status: accepted
locale: en-US
