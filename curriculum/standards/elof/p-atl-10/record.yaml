id: ea.standard.elof.p-atl-10
framework: elof
framework_title: Head Start Early Learning Outcomes Framework
code: "P-ATL 10"
title: "Child demonstrates initiative and independence."
domain_area: "Approaches to Learning"
sub_domain: "Initiative and Curiosity"
age_band: preschooler
indicators:
  - age_period: "36 to 48 Months"
    text: "Regularly shows initiative, particularly in interactions with familiar adults. Works independently for brief periods of time without adult prompting."
  - age_period: "48 to 60 Months"
    text: "Frequently shows initiative, particularly when engaged in preferred activities. Demonstrates a willingness and capability to work independently for increasing amounts of time."
  - age_period: "By 60 Months"
    text: "Engages in independent activities."
  - age_period: "By 60 Months"
    text: "Makes choices and communicates these to adults and other children."
  - age_period: "By 60 Months"
    text: "Independently identifies and seeks things to complete activities or tasks, such as gathering art supplies to make a mask or gathering cards to play a matching activity."
  - age_period: "By 60 Months"
    text: "Plans play scenarios, such as dramatic play or construction, by establishing roles for play, using appropriate materials, and generating appropriate scenarios to be enacted."
source_url: https://headstart.gov/school-readiness/article/approaches-learning-preschool
attribution: "Head Start Early Learning Outcomes Framework (ELOF), Office of Head Start — U.S. federal government work, public domain."
status: accepted
locale: en-US
