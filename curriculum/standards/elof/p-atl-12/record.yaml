id: ea.standard.elof.p-atl-12
framework: elof
framework_title: Head Start Early Learning Outcomes Framework
code: "P-ATL 12"
title: "Child expresses creativity in thinking and communication."
domain_area: "Approaches to Learning"
sub_domain: "Creativity"
age_band: preschooler
indicators:
  - age_period: "36 to 48 Months"
    text: "Responds to adults' prompts to express creative ideas in words and/or actions."
  - age_period: "48 to 60 Months"
    text: "Communicates creative ideas and actions both with and without prompting from adults."
  - age_period: "By 60 Months"
    text: "Asks questions related to tasks or activities that indicate thinking about new ways to accomplish the task or activity."
  - age_period: "By 60 Months"
    text: "Approaches tasks, activities, and play in ways that show creative problem solving."
  - age_period: "By 60 Months"
    text: "Uses multiple means of communication to creatively express thoughts, feelings, or ideas."
source_url: https://headstart.gov/school-readiness/article/approaches-learning-preschool
attribution: "Head Start Early Learning Outcomes Framework (ELOF), Office of Head Start — U.S. federal government work, public domain."
status: accepted
locale: en-US
