id: ea.standard.elof.it-atl-7
framework: elof
framework_title: Head Start Early Learning Outcomes Framework
code: "IT-ATL 7"
title: "Child shows interest in and curiosity about objects, materials, or events."
domain_area: "Approaches to Learning"
sub_domain: "Initiative and Curiosity"
age_band: infant-toddler
indicators:
  - age_period: "Birth to 9 Months"
    text: "Shows excitement when engaged in learning, such as smiling at an adult, laughing after batting at a mobile, or knocking over a toy."
  - age_period: "8 to 18 Months"
    text: "Approaches new events, experiences with others, or materials with interest and curiosity, such as intently listening to a new song or examining new toys or materials."
  - age_period: "16 to 36 Months"
    text: "Participates in new experiences, asks questions, and experiments with new things or materials, such as collecting leaves and pinecones in the fall."
  - age_period: "By 36 Months"
    text: "Asks questions about what things are, how they are used, or what is happening."
  - age_period: "By 36 Months"
    text: "Experiments with different ways of using new objects or materials."
  - age_period: "By 36 Months"
    text: "Shows awareness of and interest in changes in the environment, such as changes in room arrangement, weather, or usual activities."
source_url: https://headstart.gov/school-readiness/article/approaches-infant
attribution: "Head Start Early Learning Outcomes Framework (ELOF), Office of Head Start — U.S. federal government work, public domain."
status: accepted
locale: en-US
