id: ea.standard.elof.p-se-8
framework: elof
framework_title: Head Start Early Learning Outcomes Framework
code: "P-SE 8"
title: "Child manages emotions with increasing independence."
domain_area: "Social and Emotional Development"
sub_domain: "Emotional Functioning"
age_band: preschooler
indicators:
  - age_period: "36 to 48 Months"
    text: "Manages less intense emotions, such as mild frustration, independently. May require adult support to manage more intense emotions."
  - age_period: "48 to 60 Months"
    text: "Has an expanding range of strategies for managing emotions, both less intense emotions and those that cause greater distress. Sometimes looks to adults for support in managing the most intense emotions, but shows increasing skill in managing emotions independently."
  - age_period: "By 60 Months"
    text: "Expresses feelings in ways that are appropriate to the situation."
  - age_period: "By 60 Months"
    text: "Looks for adult assistance when feelings are most intense."
  - age_period: "By 60 Months"
    text: "Uses a range of coping strategies to manage emotions with the support of an adult, such as using words or taking a deep breath."
source_url: https://headstart.gov/school-readiness/article/social-preschool
