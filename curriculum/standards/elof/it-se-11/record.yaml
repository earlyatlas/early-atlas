id: ea.standard.elof.it-se-11
framework: elof
framework_title: Head Start Early Learning Outcomes Framework
code: "IT-SE 11"
title: "Child understands some characteristics of self and others."
domain_area: "Social and Emotional Development"
sub_domain: "Sense of Identity and Belonging"
age_band: infant-toddler
indicators:
  - age_period: "Birth to 9 Months"
    text: "Listens and responds by quieting, smiling, or cooing when name is said to child or when it is used in conversation with a familiar adult."
  - age_period: "8 to 18 Months"
    text: "Responds by looking or coming when called by name. Pays attention when others notice what the child is able to do."
  - age_period: "16 to 36 Months"
    text: "Identifies obvious physical similarities and differences between self and others. Compares characteristics of self and others."
  - age_period: "By 36 Months"
    text: "Recognizes own name."
  - age_period: "By 36 Months"
    text: "Identifies some physical characteristics of self, such as hair color, age, sex, or size."
  - age_period: "By 36 Months"
    text: "Recognizes some similarities and differences between self and others."
source_url: https://headstart.gov/school-readiness/article/social-infant
attribution: "Head Start Early Learning Outcomes Framework (ELOF), Office of Head Start — U.S. federal government work, public domain."
status: accepted
locale: en-US
