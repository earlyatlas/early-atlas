id: ea.standard.elof.p-atl-4
framework: elof
framework_title: Head Start Early Learning Outcomes Framework
code: "P-ATL 4"
title: "Child manages actions, words, and behavior with increasing independence."
domain_area: "Approaches to Learning"
sub_domain: "Emotional and Behavioral Self-Regulation"
age_band: preschooler
indicators:
  - age_period: "36 to 48 Months"
    text: "Manages own actions, words, and behavior with frequent support from adults, such as reminders to use gentle touches and friendly words."
  - age_period: "48 to 60 Months"
    text: "Manages own actions, words, and behavior with occasional support from adults."
  - age_period: "By 60 Months"
    text: "Demonstrates control over actions and words in response to a challenging situation, such as wanting to use the same materials as another child, or frustration over not being able to climb to the top of a structure. May need support from adults."
  - age_period: "By 60 Months"
    text: "Manages behavior according to expectations, such as using quiet feet when asked or sitting on the rug during circle time."
  - age_period: "By 60 Months"
    text: "Waits for turn, such as waits in line to wash hands or waits for turn on swings."
  - age_period: "By 60 Months"
    text: "Refrains from aggressive behavior towards others."
  - age_period: "By 60 Months"
    text: "Begins to understand the consequences of behavior, such as hitting leads to an adult giving you quiet time. Can describe the effects their behavior may have on others, such as noticing that another child feels sad when you hit him."
source_url: https://headstart.gov/school-readiness/article/approaches-learning-preschool
attribution: "Head Start Early Learning Outcomes Framework (ELOF), Office of Head Start — U.S. federal government work, public domain."
status: accepted
locale: en-US
