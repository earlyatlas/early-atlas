id: ea.skill.mathematics.number-sense.adds-single-digit
slug: adds-single-digit
title: Adds Single-Digit Numbers
short_description: Child adds two single-digit numbers.
developmental_purpose: >-
  Combining small quantities is the foundation of arithmetic and builds fluency
  with number relationships.
