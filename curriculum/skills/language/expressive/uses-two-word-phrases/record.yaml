id: ea.skill.language.expressive.uses-two-word-phrases
slug: uses-two-word-phrases
title: Uses Two-Word Phrases
short_description: Child combines two words to express an idea or request.
developmental_purpose: >-
  Combining words is the start of grammar; it lets a child express richer
  meaning than single words and marks a key expressive-language milestone.
domain_ids:
  - ea.domain.language
age_range_months:
  min: 18
  max: 36
developmental_stage: toddler_to_preschool
prerequisite_skill_ids:
  - ea.skill.language.expressive.names-familiar-objects
mastery_criteria:
  - Spontaneously combines two words (e.g., "more milk", "daddy go") to make meaning.
observation_prompts:
  - During play or routines, does the child put two words together on their own?
supporting_activity_ids:
  - ea.activity.language.more-please-snack
accessibility_notes:
  - Two-symbol AAC combinations or two-sign combinations count as two-word phrases.
  - Model expansions by repeating the child's word and adding one more.
research_reference_ids:
  - ea.citation.cdc.learn-the-signs
  - ea.citation.headstart.elof
tags:
  - expressive-language
  - phrases
  - grammar
  - toddler
standard_ids:
  - ea.standard.elof.it-lc-5
status: accepted
locale: en-US
