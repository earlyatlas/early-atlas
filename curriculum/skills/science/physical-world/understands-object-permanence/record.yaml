id: ea.skill.science.physical-world.understands-object-permanence
slug: understands-object-permanence
title: Understands Object Permanence
short_description: Child knows that people and objects still exist when out of sight and searches for them.
developmental_purpose: >-
  Realizing that things continue to exist when hidden is a foundational
  understanding of the physical world. It frees the child to hold an object in
  mind, search systematically, and trust that caregivers return.
domain_ids:
  - ea.domain.science
age_range_months:
  min: 6
  max: 36
developmental_stage: infant_to_toddler
mastery_criteria:
  - Shows awareness that a person or object still exists after it leaves sight or sound range.
  - Searches for a hidden object in the place it was last seen.
  - Uses more than one search strategy, looking in several locations for a missing object.
observation_prompts:
  - When a toy is covered, does the child reach to uncover it?
  - Does the child look toward a door where a caregiver left the room?
accessibility_notes:
  - Use sound-making objects so children with vision differences can track hiding by ear.
  - Hide objects under lightweight, easy-to-lift covers for children with motor differences.
research_reference_ids:
  - ea.citation.cdc.learn-the-signs
tags:
  - object-permanence
  - physical-world
  - searching
  - infant-toddler
standard_ids:
  - ea.standard.elof.it-c-4
status: accepted
locale: en-US
