id: ea.methodology.charlotte-mason
slug: charlotte-mason
title: Charlotte Mason
short_description: A gentle, literature-rich approach built on "living books," narration, and daily time in nature.
origin: Named for British educator Charlotte Mason (1842–1923), whose ideas spread through her teacher-training work in England.
principles:
  - Living books — rich, well-written stories over dry textbooks.
  - Narration — the child retells what they heard in their own words.
  - Short, focused lessons that protect attention in the early years.
  - Daily nature study and unhurried time outdoors.
  - Forming good habits and treating the child as a whole person.
inspiration_note: >-
  Lessons tagged Charlotte Mason are inspired by these ideas — story-rich language,
  narration, and nature study. They are original Early Atlas activities, not an
  official Charlotte Mason program.
tags:
  - living-books
  - narration
  - nature-study
status: accepted
locale: en-US
