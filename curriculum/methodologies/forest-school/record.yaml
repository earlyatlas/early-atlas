id: ea.methodology.forest-school
slug: forest-school
title: Forest School
short_description: An outdoor approach where children learn through regular, hands-on play and supported risk-taking in nature.
origin: Rooted in Scandinavian outdoor traditions and popularized in the UK as the "Forest School" model.
principles:
  - Regular, repeated sessions in a natural outdoor setting.
  - Child-led, play-based exploration of the environment.
  - Supported, age-appropriate risk-taking that builds confidence.
  - Connection to nature, seasons, and natural materials.
  - Time and freedom for deep, unhurried investigation.
inspiration_note: >-
  Lessons tagged Forest School are inspired by these ideas — outdoor exploration,
  natural materials, and healthy risk-taking. They are original Early Atlas
  activities, not an accredited Forest School program.
tags:
  - outdoor
  - nature
  - risk-taking
status: accepted
locale: en-US
