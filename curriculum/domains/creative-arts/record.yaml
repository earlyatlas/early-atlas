id: ea.domain.creative-arts
slug: creative-arts
title: Creative Arts
description: >-
  Children express ideas, feelings, and observations through visual art, music,
  movement and dance, and dramatic play. The creative arts invite young children
  to explore materials, sound, and story in open-ended ways, valuing the process
  of making over any finished product.
