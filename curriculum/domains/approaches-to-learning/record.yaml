id: ea.domain.approaches-to-learning
slug: approaches-to-learning
title: Approaches to Learning
description: >-
  The "learning to learn" skills that shape how a child engages with people,
  materials, and ideas: curiosity and initiative, attention and executive
  function, working memory, and persistence. These dispositions describe how a
  child approaches a task rather than what they feel about it, and they are
  distinct from the relationship and emotion skills of social-emotional
  development.
